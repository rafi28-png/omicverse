<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="OmicVerse — Free open-source bioinformatics research suite. Genome, variant, expression, pathway, protein, and 17+ omics modules.">
  <meta name="theme-color" content="#060912">

  <!-- Content Security Policy -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' https://cdn.jsdelivr.net https://www.gstatic.com https://*.gstatic.com https://unpkg.com https://*.unpkg.com;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    connect-src 'self' https://*.supabase.co wss://*.supabase.co https://rest.ensembl.org https://grch37.rest.ensembl.org https://rest.uniprot.org https://alphafold.ebi.ac.uk https://www.ebi.ac.uk https://rest.kegg.jp https://string-db.org https://gtexportal.org https://dgidb.org https://clinicaltrials.gov https://api.genome.ucsc.edu https://www.pgscatalog.org https://api.gdc.cancer.gov https://data.4dnucleome.org https://jaspar.elixir.no https://gnomad.broadinstitute.org https://www.encodeproject.org https://eutils.ncbi.nlm.nih.gov https://spliceailookup.broadinstitute.org https://www.cbioportal.org https://www.kegg.jp https://www.uniprot.org https://clinicaltables.nlm.nih.gov https://api.opentargets.io https://mygene.info https://www.gstatic.com https://*.gstatic.com https://unpkg.com https://*.unpkg.com https://api.allorigins.win;
    font-src 'self' https://fonts.gstatic.com https://fonts.googleapis.com https://www.gstatic.com https://*.gstatic.com;
    img-src 'self' data: blob: https://www.gstatic.com https://*.gstatic.com https://unpkg.com https://*.unpkg.com;
    worker-src 'self' blob:;
    frame-src 'self' https://alphafold.ebi.ac.uk;
  ">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="OmicVerse">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>OmicVerse — Bioinformatics Research Suite</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Loading screen: shown until Flutter renders on top of it -->
  <style>
    #fl-loading {
      position: fixed; inset: 0;
      background: #060912;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999;
      transition: opacity 0.4s ease-out;
    }
    #fl-loading .logo {
      font-size: 28px; font-weight: 700; letter-spacing: 2px;
      color: #00F5D4; font-family: sans-serif; margin-bottom: 32px;
    }
    #fl-loading .logo span { color: #5B8DEE; }
    #fl-loading .ring {
      width: 48px; height: 48px;
      border: 3px solid #1a2535;
      border-top-color: #00F5D4;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #fl-loading .hint {
      margin-top: 24px; font-size: 13px;
      color: #5a7a9a; font-family: sans-serif;
    }
  </style>
  <div id="fl-loading">
    <div class="logo">Omic<span>Verse</span></div>
    <div class="ring"></div>
    <div class="hint">Loading research suite…</div>
  </div>

  <!-- SPA routing fix: restore path stored by 404.html -->
  <script>
    (function() {
      var redirect = sessionStorage.redirect;
      delete sessionStorage.redirect;
      if (redirect && redirect !== location.href) {
        history.replaceState(null, null, redirect);
      }
    })();
  </script>
  <!-- Unregister stale service workers from previous builds -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(r) { r.unregister(); });
      });
    }
  </script>
  <!-- Remove loading screen once Flutter renders -->
  <script>
    function fadeOutLoading() {
      var el = document.getElementById('fl-loading');
      if (!el) return;
      el.style.opacity = '0';
      setTimeout(function() { el.remove(); }, 500);
    }
    var obs = new MutationObserver(function() {
      if (document.querySelector('flutter-view, flt-glass-pane')) {
        obs.disconnect();
        // Give Flutter 800ms to render first frame before fading
        setTimeout(fadeOutLoading, 800);
      }
    });
    obs.observe(document.body, { childList: true, subtree: true });
    // Failsafe: remove after 15s no matter what
    setTimeout(fadeOutLoading, 15000);
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
