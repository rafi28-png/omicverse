name: omicverse
description: Free open-source cross-platform bioinformatics research suite
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.0.0
  flutter_riverpod: ^2.5.0
  supabase_flutter: ^2.5.0
  dio: ^5.4.0
  hive_flutter: ^1.1.0
  flutter_dotenv: ^5.1.0
  connectivity_plus: ^6.0.0
  collection: ^1.18.0
  intl: ^0.19.0
  url_launcher: ^6.2.0
  package_info_plus: ^8.0.0
  logger: ^2.4.0
  # Phase 6+ packages:
  file_picker: ^8.0.0
  archive: ^3.6.0
  csv: ^6.0.0
  crypto: ^3.0.3
  # cached_network_image: ^3.3.0
  fl_chart: ^0.68.0
  # pdf: ^3.11.0
  # printing: ^5.12.0
  # share_plus: ^10.0.0
  # screenshot: ^3.0.0
  # path_provider: ^2.1.0
  # flutter_inappwebview: ^6.1.0  <-- Phase 9M only

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/demo_data/
    - assets/html/
  fonts:
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-Variable.ttf
    - family: IBMPlexSans
      fonts:
        - asset: assets/fonts/IBMPlexSans-Regular.ttf
        - asset: assets/fonts/IBMPlexSans-Medium.ttf
          weight: 500
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Variable.ttf
    - family: Rajdhani
      fonts:
        - asset: assets/fonts/Rajdhani-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Rajdhani-Bold.ttf
          weight: 700
